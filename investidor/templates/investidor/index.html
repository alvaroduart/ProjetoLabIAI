<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>InvestAI - Início</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
        <h2 class="text-2xl font-bold text-indigo-700 mb-6 text-center">Perfil do Investidor</h2>
        
        {% if erro %}
        <div class="bg-red-50 border-l-4 border-red-500 text-red-700 p-4 mb-6 rounded-r-lg text-sm" role="alert">
            <p>{{ erro }}</p>
        </div>
        {% endif %}

        <form id="investForm" action="{% url 'processar_analise' %}" method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700">Ações (Ex: PETR4, VALE3)</label>
                <input type="text" name="ativos" required placeholder="Digite os tickers separados por vírgula" 
                       class="w-full mt-1 p-2 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Objetivo</label>
                    <select name="objetivo" class="w-full mt-1 p-2 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="Curto">Curto Prazo</option>
                        <option value="Médio">Médio Prazo</option>
                        <option value="Longo">Longo Prazo</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Risco</label>
                    <select name="risco" class="w-full mt-1 p-2 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="Conservador">Conservador</option>
                        <option value="Moderado">Moderado</option>
                        <option value="Arrojado">Arrojado</option>
                    </select>
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Valor para Investir (R$)</label>
                <input type="number" name="valor" required min="1" placeholder="Ex: 5000" 
                       class="w-full mt-1 p-2 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
            </div>

            <a href="{% url 'questionario_perfil' %}" class="block text-center mt-4 text-indigo-600 hover:text-indigo-800 hover:underline text-sm font-semibold transition">
                    Não sabe seu perfil? Faça o teste guiado pela IA
            </a>
            
            <button type="submit" id="submitBtn" 
                    class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition flex justify-center items-center gap-2 mt-4">
                <span>Gerar Recomendação IA</span>
                
            </button>
        </form>
    </div>

    <script>
        document.getElementById('investForm').addEventListener('submit', function() {
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; // Bloqueia duplo clique
            btn.classList.add('opacity-75', 'cursor-not-allowed');
            // Muda o texto e adiciona um ícone de "carregando" simples
            btn.innerHTML = `
                <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Analisando o mercado...
            `;
        });
    </script>
</body>
</html>
