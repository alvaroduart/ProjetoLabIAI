<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Descubra seu Perfil - InvestAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen py-10">
    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-xl">
        <h2 class="text-2xl font-bold text-indigo-700 mb-2 text-center">Descoberta de Perfil</h2>
        <p class="text-slate-500 text-sm text-center mb-6">Responda para a IA personalizar sua carteira.</p>
        
        <form id="investForm" action="{% url 'processar_questionario' %}" method="POST" class="space-y-5">
            {% csrf_token %}
            
            <div class="p-4 bg-slate-50 rounded-xl border border-slate-200 space-y-4">
                <h3 class="font-semibold text-slate-800">1. Dados Base</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase">Ações (Ex: PETR4, VALE3)</label>
                        <input type="text" name="ativos" required class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase">Valor (R$)</label>
                        <input type="number" name="valor" required class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <h3 class="font-semibold text-slate-800">2. Comportamento</h3>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700">Seus investimentos caíram 20% nesta semana. O que você faz?</label>
                    <select name="q_queda" class="w-full mt-1 p-2 border rounded-lg bg-white">
                        <option value="Vendo tudo imediatamente para não perder mais">Vendo tudo imediatamente (Pânico)</option>
                        <option value="Fico preocupado, mas espero para ver se recupera">Espero para ver se recupera</option>
                        <option value="Aproveito a queda para comprar mais ações baratas">Compro mais ações (Oportunidade)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Por quanto tempo não precisará deste dinheiro?</label>
                    <select name="q_tempo" class="w-full mt-1 p-2 border rounded-lg bg-white">
                        <option value="Menos de 1 ano">Menos de 1 ano</option>
                        <option value="De 1 a 5 anos">De 1 a 5 anos</option>
                        <option value="Mais de 5 anos">Mais de 5 anos</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Qual o foco principal deste investimento?</label>
                    <input type="text" name="q_objetivo" placeholder="Ex: Comprar uma casa, aposentadoria, viagem..." required class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
            </div>
            
            <button type="submit" id="submitBtn" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition">
                Analisar Perfil e Gerar Relatório
            </button>
        </form>
    </div>
</body>
</html>
